<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Gestión Compras</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="ad-logo-box">AD</div>
        <div class="header-text"><h1>Aranmex</h1><span>Departamento de Compras</span></div>
    </header>

    <main class="container">
        <div id="compras-container" class="product-grid"></div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-client'
        const _supabase = createClient('https://bhmkqevggjunssdddxjr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobWtxZXZnZ2p1bnNzZGRkeGpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzE0OTQsImV4cCI6MjA5MDA0NzQ5NH0.HrGB8jtMEvIIPjpn2VsFDt6p18U1j8BtEfjR97WlbOw')

        async function loadCompras() {
            const { data } = await _supabase.from('requisiciones').select('*').neq('estado', 'CERRADO').order('id', {ascending: false});
            document.getElementById('compras-container').innerHTML = data.map(req => `
                <div class="product-card">
                    <div class="status-badge">${req.estado}</div>
                    <h2 class="product-name">${req.item}</h2>
                    <p class="description">Folio: #${req.id} | ${req.justificacion}</p>
                    ${req.estado === 'PENDIENTE' ? `<button class="btn-status btn-order" onclick="upd(${req.id}, 'ORDENADO')">Marcar Ordenado</button>` : ''}
                    ${req.estado === 'ORDENADO' ? `<button class="btn-status btn-received" onclick="upd(${req.id}, 'RECIBIDO')">Marcar Recibido</button>` : ''}
                </div>
            `).join('');
        }

        window.upd = async (id, st) => {
            await _supabase.from('requisiciones').update({ estado: st }).eq('id', id);
            loadCompras();
        };
        loadCompras();
    </script>
</body>
</html>
