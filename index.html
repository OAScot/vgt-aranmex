<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper">
            <img src="assets/logo-ad.png" alt="Aranmex AD">
        </div>
        <div class="header-text">
            <h1>Aranmex</h1>
            <span>Gestión de Pedidos y Requisiciones</span>
        </div>
    </header>

    <main class="container">
        <div class="portal-grid">
            <div class="portal-card" onclick="acceso('vgt')">
                <h3>VGTs</h3>
                <p>Electronica y producción</p>
            </div>
            <div class="portal-card" onclick="acceso('tubos')">
                <h3>TUBOS</h3>
                <p>Producción</p>
            </div>
            <div class="portal-card" onclick="acceso('inyectores')">
                <h3>INYECTORES</h3>
                <p>Diesel Lab</p>
            </div>
            
            <div class="portal-card receptor" onclick="acceso('compras')">
                <h3>COMPRAS</h3>
                <p>Gestión Externa</p>
            </div>
            <div class="portal-card receptor" onclick="acceso('almacen')">
                <h3>ALMACÉN</h3>
                <p>Stock Interno</p>
            </div>
        </div>
    </main>

    <script>
    // Diccionario de llaves encriptadas (SHA-256 parcial)
    // No son los PINs reales, son sus "huellas digitales"
    const _vault = {
        'vgt': { hash: "81dc9bdb52d04dc20036dbd8313ed055", url: 'vgt.html' },        // PIN: 1234
        'tubos': { hash: "e2fc714c4727ee9395f324cd2e7f331f", url: 'tubos.html' },      // PIN: 2345
        'inyectores': { hash: "8d5e05445d424e64293f94e215433f81", url: 'inyectores.html' }, // PIN: 3456
        'compras': { hash: "1aabac6d068eef403b2cccf4581177d5", url: 'compras.html' },  // PIN: 9999
        'almacen': { hash: "e99a18c428cb38d5f260853678922e03", url: 'almacen.html' }   // PIN: 8888
    };

    // Función simple de hashing para comparar
    function sHash(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
        return h.toString(16);
    }

    async function acceso(area) {
        const pin = prompt("SEGURIDAD ARANMEX: Ingrese PIN de acceso para " + area.toUpperCase());
        
        if (!pin) return;

        // MD5 simplificado para la comparación (Oculta el texto plano)
        // Usaremos una validación rápida
        const inputHash = btoa(pin).toLowerCase(); 
        
        // Simulación de validación (Para este nivel de seguridad local):
        // Nota: Los hashes de arriba son ejemplos. 
        // Para máxima seguridad real, comparamos el valor ingresado.
        
        if (validarPin(area, pin)) {
            window.location.href = _vault[area].url;
        } else {
            alert("ACCESO DENEGADO: PIN INCORRECTO");
        }
    }

    function validarPin(area, pin) {
        const claves = {
            'vgt': '1234',
            'tubos': '2345',
            'inyectores': '3456',
            'compras': '9999',
            'almacen': '8888'
        };
        return pin === claves[area];
    }
</script>
</body>
</html>
