<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper">
            <img src="assets/logo-ad.png" alt="Aranmex AD">
        </div>
        <div class="header-text">
            <h1>Aranmex</h1>
            <span>Gestión de Pedidos y Requisiciones</span>
        </div>
    </header>

    <main class="container">
        <div class="portal-grid">
            <div class="portal-card" onclick="abrirLogin('vgt')"><h3>VGTs</h3><p>Electrónica e Ingeniería</p></div>
            <div class="portal-card" onclick="abrirLogin('turbos')"><h3>TUBOS</h3><p>Producción</p></div>
            <div class="portal-card" onclick="abrirLogin('inyectores')"><h3>INYECTORES</h3><p>Diesel Lab</p></div>
            <div class="portal-card receptor" onclick="abrirLogin('compras')"><h3>COMPRAS</h3><p>Gestión Externa</p></div>
            <div class="portal-card receptor" onclick="abrirLogin('almacen')"><h3>ALMACÉN</h3><p>Stock Interno</p></div>
        </div>
    </main>

    <div id="modal-login" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:8px; width:300px; text-align:center;">
            <h3 id="login-title" style="margin-bottom:15px; text-transform:uppercase;">Acceso</h3>
            <input type="password" id="pin-input" placeholder="PIN" style="text-align:center; font-size:1.5rem; letter-spacing:5px; margin-bottom:20px; width: 100%; padding: 10px; border: 1px solid #ccc;">
            <button class="btn-status btn-primary" onclick="validarAccesoLocal()">Entrar</button>
            <button onclick="cerrarLogin()" style="background:none; border:none; color:grey; margin-top:15px; cursor:pointer; display: block; width: 100%;">Cancelar</button>
        </div>
    </div>

    <script>
        let areaSeleccionada = '';

        // PINs "Disfrazados" en Base64 para que no se vean al dar F12
        // vgt: 1234, turbos: 2345, inyectores: 3456, compras: 9999, almacen: 8888
        const llaves = {
            'vgt': 'MTIzNA==', 
            'turbos': 'MjM0NQ==',
            'inyectores': 'MzQ1Ng==',
            'compras': 'OTk5OQ==',
            'almacen': 'ODg4OA=='
        };

        function abrirLogin(area) {
            areaSeleccionada = area;
            document.getElementById('login-title').innerText = "ACCESO " + area.toUpperCase();
            document.getElementById('modal-login').style.display = 'flex';
            document.getElementById('pin-input').value = '';
            setTimeout(() => document.getElementById('pin-input').focus(), 100);
        }

        function cerrarLogin() {
            document.getElementById('modal-login').style.display = 'none';
        }

        function validarAccesoLocal() {
            const pinIngresado = document.getElementById('pin-input').value;
            // Convertimos el PIN ingresado para comparar con la llave "disfrazada"
            const hashIngresado = btoa(pinIngresado);

            if (hashIngresado === llaves[areaSeleccionada]) {
                window.location.href = areaSeleccionada + ".html";
            } else {
                alert("PIN INCORRECTO");
                document.getElementById('pin-input').value = '';
            }
        }

        // Enter para entrar
        document.getElementById('pin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validarAccesoLocal();
        });
    </script>
</body>
</html>
