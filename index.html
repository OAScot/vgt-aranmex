<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Portal de Requisiciones</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-wrapper">
            <img src="assets/logo-ad.png" alt="Aranmex AD">
        </div>
        <div class="header-text">
            <h1>Aranmex</h1>
            <span>Sistema Integrado de Requisiciones</span>
        </div>
    </header>

    <main class="container">
        <h2 style="text-align: center; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px;">Seleccione su Área de Ingreso</h2>
        
        <div class="portal-grid">
            <div class="portal-card" onclick="verificarAcceso('vgt')">
                <h3>Área VGT</h3>
                <p>Laboratorio I+D</p>
            </div>
            <div class="portal-card" onclick="verificarAcceso('tubos')">
                <h3>Área Tubos</h3>
                <p>Producción / Taller</p>
            </div>
            <div class="portal-card" onclick="verificarAcceso('inyectores')">
                <h3>Área Inyectores</h3>
                <p>Laboratorio Diesel</p>
            </div>
            
            <div class="portal-card receptor" onclick="verificarAcceso('compras')">
                <h3>Compras</h3>
                <p>Gestión Externa</p>
            </div>
            <div class="portal-card receptor" onclick="verificarAcceso('almacen')">
                <h3>Almacén</h3>
                <p>Inventario Interno</p>
            </div>
        </div>
    </main>

    <script src="js/portal.js"></script>
</body>
</html>
