<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | VGT Requisiciones</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper">
    <img src="assets/logo-ad.png" alt="Aranmex AD" class="main-logo">
</div>
        <div class="header-text"><h1>Aranmex</h1><span>Electrónica VGT - I+D</span></div>
    </header>

    <main class="container">
        <form id="requisition-form" class="styled-form">
            <div class="form-group"><label>Componente</label><input type="text" id="item-name" required></div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="category">
                    <option value="Reemplazo">Parte / Reemplazo</option>
                    <option value="Equipo">Estación / Equipo</option>
                </select>
            </div>
            <div class="form-group full-width"><label>Justificación Técnica</label><textarea id="justification" rows="2"></textarea></div>
            <button type="submit" class="btn-status btn-primary">Enviar a Compras</button>
        </form>

        <div id="requests-container" class="product-grid"></div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-client'
        const _supabase = createClient('https://bhmkqevggjunssdddxjr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobWtxZXZnZ2p1bnNzZGRkeGpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzE0OTQsImV4cCI6MjA5MDA0NzQ5NH0.HrGB8jtMEvIIPjpn2VsFDt6p18U1j8BtEfjR97WlbOw')

        const form = document.getElementById('requisition-form');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await _supabase.from('requisiciones').insert([{ 
                item: document.getElementById('item-name').value,
                categoria: document.getElementById('category').value,
                justificacion: document.getElementById('justification').value
            }]);
            form.reset();
            loadData();
        });

        async function loadData() {
            const { data } = await _supabase.from('requisiciones').select('*').neq('estado', 'CERRADO').order('id', {ascending: false});
            const container = document.getElementById('requests-container');
            container.innerHTML = data.map(req => `
                <div class="product-card">
                    <div class="status-badge ${req.estado === 'PENDIENTE' ? 'status-required' : ''}">${req.estado}</div>
                    <h2 class="product-name">${req.item}</h2>
                    <p class="description">${req.justificacion}</p>
                    ${req.estado === 'RECIBIDO' ? `<button class="btn-status btn-close" onclick="closeOrder(${req.id})">Cerrar Pedido (Recibido)</button>` : ''}
                </div>
            `).join('');
        }

        window.closeOrder = async (id) => {
            await _supabase.from('requisiciones').update({ estado: 'CERRADO' }).eq('id', id);
            loadData();
        };
        loadData();
    </script>
</body>
</html>
