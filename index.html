<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper">
            <img src="assets/logo-ad.png" alt="Aranmex AD">
        </div>
        <div class="header-text">
            <h1>Aranmex</h1>
            <span>Gestión de Pedidos e Inventarios</span>
        </div>
    </header>

    <main class="container">
        <div class="portal-grid">
            <div class="portal-card" onclick="acceso('vgt')">
                <h3>VGT</h3>
                <p>Ingeniería I+D</p>
            </div>
            <div class="portal-card" onclick="acceso('tubos')">
                <h3>TUBOS</h3>
                <p>Producción</p>
            </div>
            <div class="portal-card" onclick="acceso('inyectores')">
                <h3>INYECTORES</h3>
                <p>Diesel Lab</p>
            </div>
            
            <div class="portal-card receptor" onclick="acceso('compras')">
                <h3>COMPRAS</h3>
                <p>Gestión Externa</p>
            </div>
            <div class="portal-card receptor" onclick="acceso('almacen')">
                <h3>ALMACÉN</h3>
                <p>Stock Interno</p>
            </div>
        </div>
    </main>

    <script>
        // Lógica de acceso integrada para evitar fallos de carga de archivos JS
        const rutas = {
            'vgt': { pin: '1234', url: 'vgt.html' },
            'tubos': { pin: '2345', url: 'tubos.html' },
            'inyectores': { pin: '3456', url: 'inyectores.html' },
            'compras': { pin: '9999', url: 'compras.html' },
            'almacen': { pin: '8888', url: 'almacen.html' }
        };

        function acceso(area) {
            const pin = prompt("Ingrese PIN de acceso:");
            if (pin === rutas[area].pin) {
                window.location.href = rutas[area].url;
            } else if (pin !== null) {
                alert("PIN incorrecto");
            }
        }
    </script>
</body>
</html>
