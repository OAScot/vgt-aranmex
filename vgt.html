<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex SGC | Producción VGT</title>
    <link rel="stylesheet" href="../css/styles.css"> <style>
        :root { --red: #d32f2f; --blue: #1976d2; --dark: #1e1e1e; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* Header con jerarquía visual */
        .header-sgc { background: var(--dark); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--red); }
        .header-sgc h1 { margin: 0; font-size: 1.2rem; }

        .container { max-width: 900px; margin: 2rem auto; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .doc-header { background: #fdfdfd; padding: 10px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.75rem; color: #777; }

        .form-body { padding: 30px; }
        
        /* Selector de Destino (ALM vs CMP) */
        .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .dest-card { padding: 15px; border: 2px solid #ddd; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.3s; filter: grayscale(1); }
        .dest-card.active { filter: grayscale(0); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dest-card[data-target="ALM"].active { border-color: var(--red); background: #fff5f5; color: var(--red); }
        .dest-card[data-target="CMP"].active { border-color: var(--blue); background: #f0f7ff; color: var(--blue); }

        .input-group { margin-bottom: 20px; }
        .row { display: flex; gap: 20px; }
        .row > div { flex: 1; }
        
        label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 6px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        textarea { font-family: 'Roboto Mono', monospace; background: #fafafa; }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    </style>
</head>
<body>

    <header class="header-sgc">
        <div>
            <h1>ARANMEX AD | MÓDULO VGT</h1>
            <span style="font-size: 0.7rem; color: #888;">HEAD OF R&D INTERFACE</span>
        </div>
        <a href="../index.html" style="color: white; text-decoration: none; font-size: 0.8rem; border: 1px solid #444; padding: 6px 12px; border-radius: 4px;">VOLVER AL PANEL</a>
    </header>

    <div class="container">
        <div class="doc-header">
            <span>F-PRD-VGT-01 | REGISTRO DE TRAZABILIDAD</span>
            <span>PROCESO: <strong>ENSAMBLE Y CALIBRACIÓN</strong></span>
        </div>

        <div class="form-body">
            <label>DESTINO DE REQUISICIÓN:</label>
            <div class="dest-grid">
                <div id="btn-ALM" class="dest-card active" onclick="setDest('ALM')">
                    <strong>📦 ALMACÉN (ALM)</strong><br><small>Insumos y Refacciones</small>
                </div>
                <div id="btn-CMP" class="dest-card" onclick="setDest('CMP')">
                    <strong>🛒 COMPRAS (CMP)</strong><br><small>Herramienta y Equipo</small>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>RESPONSABLE DE ÁREA</label>
                    <input type="text" id="responsable" placeholder="Nombre del Ingeniero/Técnico">
                </div>
                <div class="input-group">
                    <label>ID JORNADA / ORDEN DE PRODUCCIÓN</label>
                    <input type="text" id="jornada" placeholder="Ej: LOTE-260326">
                </div>
            </div>

            <div class="input-group">
                <label id="lbl-lista">DETALLE AGRUPADO (CANT | P/N | DESCRIPCIÓN | MODELO DESTINO)</label>
                <textarea id="lista" rows="8" placeholder="5 | 6203-ZZ | Balero | VGT-V4-01&#10;3 | P-900 | Sello | VGT-HE200"></textarea>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>MOTIVO</label>
                    <select id="motivo">
                        <option value="PROD">PRODUCCIÓN DEL DÍA</option>
                        <option value="GARANTIA">GARANTÍA / RETRABAJO</option>
                        <option value="ID">INVESTIGACIÓN Y DESARROLLO</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>PRIORIDAD</label>
                    <select id="prioridad">
                        <option value="NORMAL">NORMAL</option>
                        <option value="URGENTE">URGENTE (LÍNEA DETENIDA)</option>
                    </select>
                </div>
            </div>

            <button id="btn-submit" class="btn-main" style="background: var(--red);" onclick="procesarRequisicion()">
                GENERAR VALE VGT-ALM
            </button>
        </div>
    </div>

    <script>
        let destinoActual = 'ALM';

        function setDest(d) {
            destinoActual = d;
            document.querySelectorAll('.dest-card').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-' + d).classList.add('active');
            
            const btn = document.getElementById('btn-submit');
            btn.innerText = `GENERAR VALE VGT-${d}`;
            btn.style.backgroundColor = (d === 'ALM') ? '#d32f2f' : '#1976d2';
        }

        function procesarRequisicion() {
            const resp = document.getElementById('responsable').value;
            const jornada = document.getElementById('jornada').value;
            const lista = document.getElementById('lista').value;

            if(!resp || !jornada || !lista) {
                alert("DATOS INCOMPLETOS: Se requiere información total para cumplimiento ISO.");
                return;
            }

            // --- LÓGICA DE FOLIO ESTRUCTURADO ---
            const hoy = new Date();
            const fechaID = `${hoy.getDate()}${hoy.getMonth()+1}`;
            const correlativo = Math.floor(Math.random() * 999).toString().padStart(3, '0');
            const folio = `VGT-${destinoActual}-${fechaID}-${correlativo}`;

            // Aquí es donde en el futuro llamarías a:
            // database.saveRequisicion(folio, { resp, jornada, lista, destinoActual });

            imprimirVale(folio, resp, jornada, lista);
        }

        function imprimirVale(folio, resp, jornada, lista) {
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <style>
                        body { font-family: 'Courier New', monospace; width: 80mm; padding: 5px; border: 1px solid #000; font-size: 11px; }
                        .h { text-align: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
                        .bold { font-weight: bold; }
                        .section { margin-bottom: 8px; border-bottom: 0.5px dashed #ccc; padding-bottom: 5px; }
                        .footer { margin-top: 25px; font-size: 8px; text-align: center; border-top: 1px solid #000; padding-top: 5px; }
                        .signs { margin-top: 30px; display: flex; justify-content: space-between; }
                        .line { border-top: 1px solid #000; width: 45%; text-align: center; font-size: 8px; }
                    </style>
                </head>
                <body>
                    <div class="h">
                        <h3 style="margin:0">ARANMEX AD</h3>
                        <div style="font-size:9px">SGC - VALE DE SALIDA</div>
                        <div class="bold">FOLIO: ${folio}</div>
                    </div>
                    <div class="section">
                        <div><span class="bold">FECHA:</span> ${new Date().toLocaleString()}</div>
                        <div><span class="bold">RESPONSABLE:</span> ${resp.toUpperCase()}</div>
                        <div><span class="bold">JORNADA/ID:</span> ${jornada.toUpperCase()}</div>
                    </div>
                    <div class="section">
                        <div class="bold">DETALLE DE INSUMOS:</div>
                        <div style="padding-top:5px; white-space: pre-wrap;">${lista}</div>
                    </div>
                    <div class="signs">
                        <div class="line"><br>SOLICITANTE</div>
                        <div class="line"><br>ENTREGA/AUTORIZA</div>
                    </div>
                    <div class="footer">
                        ESTE DOCUMENTO ES UN REGISTRO DE TRAZABILIDAD INTERNA.<br>
                        ISO 9001:2015 | ARANMEX AD
                    </div>
                    <script>window.onload = function(){ window.print(); window.close(); } <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
</body>
</html>
