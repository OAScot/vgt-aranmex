<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Producción VGT</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper">
            <img src="assets/logo-ad.png" alt="Aranmex AD">
        </div>
        <div class="header-text">
            <h1>Producción VGT</h1>
            <span>Salida de Material Diaria</span>
        </div>
        <a href="index.html" style="margin-left: auto; text-decoration: none; color: var(--red-aranmex); font-weight: bold;">← Panel Principal</a>
    </header>

    <main class="container">
        <div class="styled-form">
            <div class="form-group">
                <label>Técnico Responsable</label>
                <input type="text" id="operador" placeholder="Nombre completo">
            </div>
            <div class="form-group">
                <label>Lote / Orden del Día</label>
                <input type="text" id="lote" placeholder="Ej: LOTE-260326">
            </div>

            <hr class="full-width" style="margin: 10px 0; border: 0; border-top: 1px solid #eee;">

            <div class="form-group full-width">
                <label>Materiales Solicitados para Producción</label>
                <textarea id="lista-material" rows="6" placeholder="Cantidad | Descripción | Observación&#10;Ej: 20 | Conectores VGT | -&#10;Ej: 15 | Sensores Magnéticos | -"></textarea>
                <small style="color: #666;">* Tip: Puedes copiar y pegar tu lista de Excel aquí.</small>
            </div>

            <div class="form-group">
                <label>Estado de Consumo</label>
                <select id="tipo-consumo">
                    <option value="Producción Nueva">Producción Nueva</option>
                    <option value="Garantía / Retrabajo">Garantía / Retrabajo</option>
                    <option value="Muestra / Pruebas">Muestra / Pruebas</option>
                </select>
            </div>

            <div class="form-group full-width">
                <button type="button" class="btn-status btn-primary" onclick="imprimirValeProduccion()">
                    🖨️ Imprimir Vale de Despacho
                </button>
            </div>
        </div>
    </main>

    <script>
        function imprimirValeProduccion() {
            const op = document.getElementById('operador').value;
            const mat = document.getElementById('lista-material').value;

            if(!op || !mat) {
                alert("Por favor ingresa el nombre del técnico y los materiales.");
                return;
            }

            const ticket = {
                folio: "VGT-" + Math.floor(Date.now() / 100000),
                fecha: new Date().toLocaleDateString(),
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                operador: op,
                lote: document.getElementById('lote').value || "N/A",
                consumo: document.getElementById('tipo-consumo').value,
                materiales: mat.replace(/\n/g, '<br>')
            };

            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <style>
                        body { font-family: 'Arial', sans-serif; width: 80mm; padding: 5px; margin: 0; font-size: 12px; }
                        .center { text-align: center; }
                        .bold { font-weight: bold; }
                        .divider { border-top: 1px dashed #000; margin: 8px 0; }
                        .ticket-header { font-size: 16px; margin-bottom: 2px; }
                        .table-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
                        .footer { margin-top: 25px; text-align: center; font-size: 10px; }
                        .sign-space { margin-top: 30px; border-top: 1px solid #000; width: 80%; margin-left: 10%; }
                    </style>
                </head>
                <body>
                    <div class="center">
                        <div class="ticket-header bold">ARANMEX</div>
                        <div>VALE DE SALIDA - VGT</div>
                        <div class="bold">FOLIO: ${ticket.folio}</div>
                    </div>
                    <div class="divider"></div>
                    <div class="table-header">
                        <span>Fecha: ${ticket.fecha}</span>
                        <span>Hora: ${ticket.hora}</span>
                    </div>
                    <div><span class="bold">Técnico:</span> ${ticket.operador}</div>
                    <div><span class="bold">Lote:</span> ${ticket.lote}</div>
                    <div><span class="bold">Tipo:</span> ${ticket.consumo}</div>
                    <div class="divider"></div>
                    <div class="bold">MATERIALES:</div>
                    <div style="min-height: 100px; padding-top: 5px;">${ticket.materiales}</div>
                    <div class="divider"></div>
                    <div class="footer">
                        <div class="sign-space"></div>
                        <p>Firma Responsable VGT</p>
                        <br>
                        <div class="sign-space"></div>
                        <p>Entrega Almacén</p>
                    </div>
                </body>
                </html>
            `);
            win.document.close();
            win.print();
        }
    </script>
</body>
</html>
