<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Sistema de Gestión de Calidad</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .sgc-info { font-size: 0.8rem; color: #666; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .destino-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .destino-btn { flex: 1; padding: 12px; border: 2px solid #ccc; background: #f9f9f9; cursor: pointer; font-weight: bold; text-align: center; border-radius: 8px; }
        .destino-btn.active[data-destino="almacen"] { border-color: #d32f2f; background: #ffebee; color: #d32f2f; }
        .destino-btn.active[data-destino="compras"] { border-color: #1976d2; background: #e3f2fd; color: #1976d2; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-row div { flex: 1; }
        textarea { font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper"><img src="assets/logo-ad.png" alt="Aranmex AD"></div>
        <div class="header-text">
            <h1>Panel de Control de Producción</h1>
            <span>ISO 9001:2015 / Lean Six Sigma</span>
        </div>
        <a href="index.html" style="margin-left: auto; text-decoration: none; color: #d32f2f; font-weight: bold;">← Salir</a>
    </header>

    <main class="container">
        <div class="styled-form">
            <div class="sgc-info">Código de Formato: <strong>F-PRD-VGT-01</strong> | Versión: 1.0</div>
            
            <label><strong>Tipo de Requisición (Destino):</strong></label>
            <div class="destino-selector">
                <div class="destino-btn active" data-destino="almacen" onclick="setDestino('almacen')">📦 ALMACÉN INSUMOS</div>
                <div class="destino-btn" data-destino="compras" onclick="setDestino('compras')">🛒 COMPRAS / EQUIPO</div>
            </div>

            <div class="input-row">
                <div>
                    <label>Solicitante (Nombre):</label>
                    <input type="text" id="operador" placeholder="Nombre completo">
                </div>
                <div>
                    <label>Modelo / No. de Parte:</label>
                    <input type="text" id="modelo" placeholder="Ej: VGT-750 / HE200WG">
                </div>
            </div>

            <div class="form-group">
                <label id="label-material">Detalle de Materiales / Herramientas:</label>
                <textarea id="lista-material" rows="5" placeholder="CANTIDAD | DESCRIPCIÓN | NÚMERO DE SERIE (Si aplica)"></textarea>
            </div>

            <div class="input-row">
                <div>
                    <label>Motivo / Lote:</label>
                    <select id="motivo">
                        <option value="Producción Diaria">Producción Diaria</option>
                        <option value="Garantía de Cliente">Garantía de Cliente</option>
                        <option value="Daño de Equipo">Daño de Equipo / Reposición</option>
                        <option value="Investigación y Desarrollo">I+D (Proyectos)</option>
                    </select>
                </div>
                <div>
                    <label>Prioridad:</label>
                    <select id="prioridad">
                        <option value="Normal">Normal</option>
                        <option value="Urgente">Urgente (Paro de Línea)</option>
                    </select>
                </div>
            </div>

            <button type="button" id="btn-imprimir" class="btn-primary" style="background: #d32f2f; width:100%;" onclick="imprimirVale()">
                🖨️ Generar Registro de Trazabilidad
            </button>
        </div>
    </main>

    <script>
        let destinoActual = 'almacen';

        function setDestino(dest) {
            destinoActual = dest;
            document.querySelectorAll('.destino-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-destino="${dest}"]`).classList.add('active');
            const btn = document.getElementById('btn-imprimir');
            btn.style.background = dest === 'almacen' ? '#d32f2f' : '#1976d2';
        }

        function imprimirVale() {
            const op = document.getElementById('operador').value;
            const mat = document.getElementById('lista-material').value;
            const mod = document.getElementById('modelo').value;

            if(!op || !mat || !mod) { alert("Error: Todos los campos son obligatorios para trazabilidad ISO."); return; }

            const hoy = new Date();
            const folio = `${destinoActual === 'almacen' ? 'VGT' : 'COM'}-${hoy.getDate()}${hoy.getMonth()+1}-${Math.floor(Math.random()*999)}`;

            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Registro Aranmex ${folio}</title>
                    <style>
                        body { font-family: Arial; width: 80mm; padding: 5px; border: 1px solid #000; font-size: 11px; }
                        .header { display: flex; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
                        .logo { width: 30%; font-weight: bold; font-size: 14px; }
                        .title { width: 70%; text-align: right; }
                        .section { margin-bottom: 8px; border: 1px solid #eee; padding: 3px; }
                        .bold { font-weight: bold; }
                        .footer { margin-top: 20px; font-size: 9px; text-align: center; }
                        .firma { border-top: 1px solid #000; margin-top: 25px; width: 80%; margin-left: 10%; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="logo">ARANMEX</div>
                        <div class="title">
                            <div class="bold">VALE DE REQUISICIÓN</div>
                            <div>F-PRD-VGT-01 | Rev. 0</div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <div style="display:flex; justify-content:space-between">
                            <span><span class="bold">FOLIO:</span> ${folio}</span>
                            <span><span class="bold">FECHA:</span> ${hoy.toLocaleDateString()}</span>
                        </div>
                    </div>

                    <div class="section">
                        <div><span class="bold">OPERADOR:</span> ${op.toUpperCase()}</div>
                        <div><span class="bold">MODELO/PARTE:</span> ${mod.toUpperCase()}</div>
                        <div><span class="bold">MOTIVO:</span> ${document.getElementById('motivo').value}</div>
                    </div>

                    <div class="section" style="min-height: 80px;">
                        <div class="bold">DESCRIPCIÓN DE MATERIAL:</div>
                        <div style="font-family: monospace;">${mat.replace(/\n/g, '<br>')}</div>
                    </div>

                    <div style="display: flex; gap: 5px; margin-top: 30px;">
                        <div style="flex:1; text-align:center;"><div class="firma"></div>Solicitante</div>
                        <div style="flex:1; text-align:center;"><div class="firma"></div>Almacén / Compras</div>
                    </div>

                    <div class="footer">
                        Este documento es un registro oficial del SGC de Aranmex.<br>
                        "Calidad en cada componente."
                    </div>
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
