<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Producción VGT</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .destino-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .destino-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #ccc;
            background: #f9f9f9;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            border-radius: 5px;
        }
        .destino-btn.active[data-destino="almacen"] {
            border-color: #d32f2f;
            background: #ffebee;
            color: #d32f2f;
        }
        .destino-btn.active[data-destino="compras"] {
            border-color: #1976d2;
            background: #e3f2fd;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper">
            <img src="assets/logo-ad.png" alt="Aranmex AD">
        </div>
        <div class="header-text">
            <h1>Producción VGT</h1>
            <span>Requisición de Material y Equipo</span>
        </div>
        <a href="index.html" style="margin-left: auto; text-decoration: none; color: #d32f2f; font-weight: bold;">← Panel Principal</a>
    </header>

    <main class="container">
        <div class="styled-form">
            <label><strong>¿A dónde va dirigida esta solicitud?</strong></label>
            <div class="destino-selector">
                <div class="destino-btn active" data-destino="almacen" onclick="setDestino('almacen')">📦 ALMACÉN<br><small>(Insumos diarios)</small></div>
                <div class="destino-btn" data-destino="compras" onclick="setDestino('compras')">🛒 COMPRAS<br><small>(Herramientas/Faltantes)</small></div>
            </div>

            <div class="form-group">
                <label>Técnico Responsable</label>
                <input type="text" id="operador" placeholder="Nombre del técnico">
            </div>

            <div class="form-group full-width">
                <label id="label-material">Lista de Materiales / Equipos Dañados</label>
                <textarea id="lista-material" rows="5" placeholder="Cantidad | Descripción | Motivo (si es daño)"></textarea>
            </div>

            <div class="form-group">
                <label>Prioridad de Entrega</label>
                <select id="prioridad">
                    <option value="Normal">Normal</option>
                    <option value="Urgente">Urgente (Línea Detenida)</option>
                    <option value="Reparación">Mantenimiento / Reparación</option>
                </select>
            </div>

            <div class="form-group full-width">
                <button type="button" id="btn-imprimir" class="btn-status btn-primary" onclick="imprimirVale()">
                    🖨️ Generar Vale para <span id="txt-destino">ALMACÉN</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        let destinoActual = 'almacen';

        function setDestino(dest) {
            destinoActual = dest;
            // Actualizar botones UI
            document.querySelectorAll('.destino-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-destino="${dest}"]`).classList.add('active');
            
            // Cambiar texto del botón e interfaz
            document.getElementById('txt-destino').innerText = dest.toUpperCase();
            document.getElementById('label-material').innerText = dest === 'almacen' ? 
                "Lista de Materiales (Insumos)" : "Descripción de Equipo Dañado / Requerido";
            
            const btn = document.getElementById('btn-imprimir');
            btn.style.background = dest === 'almacen' ? '#d32f2f' : '#1976d2';
        }

        function imprimirVale() {
    const op = document.getElementById('operador').value;
    const mat = document.getElementById('lista-material').value;

    if(!op || !mat) {
        alert("Por favor completa los campos."); return;
    }

    // --- AQUÍ VA EL CÓDIGO DEL FOLIO ESTRUCTURADO ---
    const hoy = new Date();
    const dia = hoy.getDate().toString().padStart(2, '0');
    const mes = (hoy.getMonth() + 1).toString().padStart(2, '0');
    const random = Math.floor(Math.random() * 999).toString().padStart(3, '0');
    
    // Resultado: VGT-2603-742 (Prefijo-DíaMes-Aleatorio)
    const folioGenerado = `VGT-${dia}${mes}-${random}`;
    // ------------------------------------------------

    const colorEncabezado = destinoActual === 'almacen' ? '#d32f2f' : '#1976d2';
    const win = window.open('', '_blank');
    
    win.document.write(`
        <html>
        <head>
            <style>
                body { font-family: sans-serif; width: 80mm; padding: 10px; border: 1px solid #000; }
                .header { text-align: center; color: white; background: ${colorEncabezado}; padding: 5px; margin-bottom: 10px; }
                .bold { font-weight: bold; }
                .folio-box { border: 1px solid #000; padding: 2px 5px; background: #eee; }
                .divider { border-top: 1px dashed #000; margin: 10px 0; }
                .footer { margin-top: 30px; text-align: center; font-size: 10px; }
                .firma { border-top: 1px solid #000; width: 80%; margin: 20px auto 5px; }
            </style>
        </head>
        <body>
            <div class="header">
                <h3 style="margin:0">ARANMEX - VGT</h3>
                <p style="margin:0; font-size:12px;">DESTINO: ${destinoActual.toUpperCase()}</p>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span><span class="bold">Fecha:</span> ${hoy.toLocaleDateString()}</span>
                <span class="folio-box"><span class="bold">FOLIO:</span> ${folioGenerado}</span>
            </div>
            <div><span class="bold">Solicita:</span> ${op}</div>
            <div><span class="bold">Prioridad:</span> ${document.getElementById('prioridad').value}</div>
            <div class="divider"></div>
            <div class="bold">DETALLE:</div>
            <div style="min-height:80px; font-family: monospace;">${mat.replace(/\n/g, '<br>')}</div>
            <div class="divider"></div>
            <div class="footer">
                <div class="firma"></div>
                <p>Firma Solicitante</p>
                <div class="firma"></div>
                <p>Autorización / Recibe</p>
            </div>
        </body>
        </html>
    `);
    win.document.close();
    win.print();
}
    </script>
</body>
</html>
