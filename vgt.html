<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC Aranmex | Control de Salidas VGT</title>
    <style>
        :root { --red: #d32f2f; --blue: #1976d2; --gray: #f8f9fa; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; color: var(--dark); }
        
        /* Header ISO */
        .iso-header { background: #1a1a1a; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--red); }
        .iso-header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }

        .container { max-width: 850px; margin: 25px auto; background: white; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .doc-meta { background: var(--gray); padding: 10px 25px; border-bottom: 1px solid #ddd; font-size: 0.75rem; color: #666; display: flex; justify-content: space-between; }

        .form-content { padding: 30px; }

        /* Selector de Destino */
        .target-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .target-card { padding: 15px; border: 2px solid #ddd; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.3s; opacity: 0.6; }
        .target-card.active { opacity: 1; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .target-card[data-target="almacen"].active { border-color: var(--red); background: #fff5f5; color: var(--red); }
        .target-card[data-target="compras"].active { border-color: var(--blue); background: #f0f7ff; color: var(--blue); }

        /* Formulario */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 6px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
        textarea { font-family: 'Courier New', monospace; resize: vertical; }

        .btn-print { width: 100%; padding: 18px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header class="iso-header">
        <h1>ARANMEX AD | GESTIÓN DE PRODUCCIÓN</h1>
        <a href="index.html" style="color: #aaa; text-decoration: none; font-size: 0.8rem;">← SALIR</a>
    </header>

    <div class="container">
        <div class="doc-meta">
            <span>CÓDIGO: <strong>F-PRD-VGT-01</strong></span>
            <span>REVISIÓN: <strong>02</strong></span>
            <span>ESTADO: <strong>DOCUMENTO CONTROLADO</strong></span>
        </div>

        <div class="form-content">
            <label>DESTINO DE REQUISICIÓN:</label>
            <div class="target-selector">
                <div id="btn-almacen" class="target-card active" data-target="almacen" onclick="updateTarget('almacen')">
                    <strong>📦 ALMACÉN</strong><br><small>Refacciones e Insumos</small>
                </div>
                <div id="btn-compras" class="target-card" data-target="compras" onclick="updateTarget('compras')">
                    <strong>🛒 COMPRAS</strong><br><small>Herramientas y Activos</small>
                </div>
            </div>

            <div class="grid">
                <div>
                    <label>NOMBRE DEL SOLICITANTE</label>
                    <input type="text" id="operador" placeholder="Ej. Juan Pérez">
                </div>
                <div>
                    <label>EQUIPO DESTINO (MODELO MAESTRO)</label>
                    <input type="text" id="maestro" placeholder="Ej. Turbo HE200WG / Actuador V4">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label id="lbl-lista">LISTADO DE MATERIALES (CANTIDAD | MODELO-P/N | DESCRIPCIÓN)</label>
                <textarea id="lista" rows="6" placeholder="Ej: 2 | 6203-ZZ | Balero de bolas&#10;Ej: 1 | 352-441 | Sello de aceite"></textarea>
            </div>

            <div class="grid">
                <div>
                    <label>MOTIVO / PROCESO</label>
                    <select id="motivo">
                        <option value="PRODUCCION">PRODUCCIÓN DIARIA</option>
                        <option value="GARANTIA">GARANTÍA / RETRABAJO</option>
                        <option value="MANTENIMIENTO">MANTENIMIENTO DE EQUIPO</option>
                        <option value="DESARROLLO">INVESTIGACIÓN (I+D)</option>
                    </select>
                </div>
                <div>
                    <label>NIVEL DE PRIORIDAD</label>
                    <select id="prioridad">
                        <option value="NORMAL">NORMAL</option>
                        <option value="URGENTE">URGENTE (PARO DE LÍNEA)</option>
                    </select>
                </div>
            </div>

            <button id="btn-submit" class="btn-print" style="background: var(--red);" onclick="generarVale()">
                GENERAR REGISTRO DE TRAZABILIDAD
            </button>
        </div>
    </div>

    <script>
        let currentTarget = 'almacen';

        function updateTarget(t) {
            currentTarget = t;
            document.querySelectorAll('.target-card').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
            
            const btn = document.getElementById('btn-submit');
            const lbl = document.getElementById('lbl-lista');
            
            if(t === 'almacen') {
                btn.style.backgroundColor = '#d32f2f';
                lbl.innerText = "LISTADO DE MATERIALES (CANTIDAD | MODELO-P/N | DESCRIPCIÓN)";
            } else {
                btn.style.backgroundColor = '#1976d2';
                lbl.innerText = "ESPECIFICACIÓN DE HERRAMIENTA O EQUIPO DAÑADO";
            }
        }

        function generarVale() {
            const op = document.getElementById('operador').value;
            const mat = document.getElementById('lista').value;
            const mae = document.getElementById('maestro').value;

            if(!op || !mat || !mae) {
                alert("ERROR DE CONTROL: Todos los campos son obligatorios para la trazabilidad ISO 9001.");
                return;
            }

            const hoy = new Date();
            const folio = `${currentTarget === 'almacen' ? 'VGT' : 'COM'}-${hoy.getDate()}${hoy.getMonth()+1}-${Math.floor(Math.random()*999)}`;
            
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <style>
                        body { font-family: 'Courier New', monospace; width: 80mm; padding: 5px; border: 1px solid #000; font-size: 12px; }
                        .h { text-align: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
                        .bold { font-weight: bold; }
                        .section { margin-bottom: 10px; padding: 2px; border-bottom: 0.5px dashed #ccc; }
                        .footer { margin-top: 25px; font-size: 9px; text-align: center; border-top: 1px solid #000; padding-top: 5px; }
                        .sign { margin-top: 30px; display: flex; justify-content: space-between; }
                        .line { border-top: 1px solid #000; width: 45%; text-align: center; font-size: 9px; }
                    </style>
                </head>
                <body>
                    <div class="h">
                        <h3 style="margin:0">ARANMEX AD</h3>
                        <div style="font-size:9px">REGISTRO: F-PRD-VGT-01</div>
                        <div class="bold">FOLIO: ${folio}</div>
                    </div>
                    
                    <div class="section">
                        <div><span class="bold">FECHA:</span> ${hoy.toLocaleString()}</div>
                        <div><span class="bold">SOLICITA:</span> ${op.toUpperCase()}</div>
                        <div><span class="bold">EQ. MAESTRO:</span> ${mae.toUpperCase()}</div>
                    </div>

                    <div class="section">
                        <div><span class="bold">MOTIVO:</span> ${document.getElementById('motivo').value}</div>
                        <div><span class="bold">PRIORIDAD:</span> ${document.getElementById('prioridad').value}</div>
                    </div>

                    <div class="section">
                        <div class="bold">DETALLE DE MATERIALES:</div>
                        <div style="padding-top:5px; white-space: pre-wrap;">${mat}</div>
                    </div>

                    <div class="sign">
                        <div class="line"><br>SOLICITANTE</div>
                        <div class="line"><br>AUTORIZA / RECIBE</div>
                    </div>

                    <div class="footer">
                        ESTE DOCUMENTO ES UN REGISTRO DE CALIDAD.<br>
                        "TRAZABILIDAD GARANTIZADA"
                    </div>
                    <script>window.onload = function(){ window.print(); window.close(); } <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
