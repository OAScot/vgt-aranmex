<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranmex | Área VGT</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-wrapper">
            <img src="assets/logo-ad.png" alt="Aranmex AD">
        </div>
        <div class="header-text">
            <h1>Área VGT</h1>
            <span>Ingeniería y Desarrollo</span>
        </div>
        <a href="index.html" style="margin-left: auto; text-decoration: none; color: var(--red-aranmex); font-weight: bold;">← Salir</a>
    </header>

    <main class="container">
        <section class="form-container">
            <h2>Nueva Requisición de Material</h2>
            <br>
            <form id="form-requisicion" class="styled-form">
                <div class="form-group">
                    <label>Solicitante</label>
                    <input type="text" id="solicitante" placeholder="Nombre del técnico" required>
                </div>

                <div class="form-group">
                    <label>Proyecto / Orden de Trabajo</label>
                    <input type="text" id="proyecto" placeholder="Ej: Calibrador V4.0" required>
                </div>

                <div class="form-group full-width">
                    <label>Descripción del Material / Componente</label>
                    <textarea id="material" rows="3" placeholder="Ej: 5x ESP32 DevKit, 10x Resistencias 10k..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Urgencia</label>
                    <select id="urgencia">
                        <option value="Normal">Normal</option>
                        <option value="Alta">Alta (Producción Detenida)</option>
                        <option value="Stock">Reposición de Stock</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <button type="button" class="btn-status btn-primary" onclick="generarVale()">Generar Vale e Imprimir</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        function generarVale() {
            // Capturar datos
            const datos = {
                folio: Math.floor(Math.random() * 9000) + 1000,
                fecha: new Date().toLocaleString(),
                solicitante: document.getElementById('solicitante').value,
                proyecto: document.getElementById('proyecto').value,
                material: document.getElementById('material').value,
                urgencia: document.getElementById('urgencia').value
            };

            if(!datos.solicitante || !datos.material) {
                alert("Por favor llena los campos obligatorios.");
                return;
            }

            // Crear ventana de impresión
            const ventana = window.open('', '_blank');
            ventana.document.write(`
                <html>
                <head>
                    <title>Vale de Requisición - Aranmex</title>
                    <style>
                        body { font-family: 'Courier New', Courier, monospace; padding: 20px; border: 1px solid #000; width: 500px; margin: auto; }
                        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; }
                        .content { margin-top: 20px; line-height: 1.6; }
                        .footer { margin-top: 40px; display: flex; justify-content: space-between; }
                        .firma { border-top: 1px solid #000; width: 150px; text-align: center; font-size: 0.8rem; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h2>ARANMEX AD</h2>
                        <p>VALE DE REQUISICIÓN INTERNA</p>
                        <p><strong>FOLIO: #${datos.folio}</strong></p>
                    </div>
                    <div class="content">
                        <p><strong>Fecha:</strong> ${datos.fecha}</p>
                        <p><strong>Área:</strong> VGT / INGENIERÍA</p>
                        <p><strong>Solicita:</strong> ${datos.solicitante}</p>
                        <p><strong>Proyecto:</strong> ${datos.proyecto}</p>
                        <p><strong>Prioridad:</strong> ${datos.urgencia}</p>
                        <hr>
                        <p><strong>MATERIAL SOLICITADO:</strong></p>
                        <p>${datos.material.replace(/\n/g, '<br>')}</p>
                    </div>
                    <div class="footer">
                        <div class="firma"><br>Solicitante</div>
                        <div class="firma"><br>Autoriza (I+D)</div>
                        <div class="firma"><br>Almacén</div>
                    </div>
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            ventana.document.close();
        }
    </script>
</body>
</html>
